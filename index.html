<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue Produits</title>
  </head>
  <body class="bg-gray-100">
    <nav class="p-4 bg-blue-600 text-white flex gap-4">
      <a href="index.html" class="font-bold underline">Catalogue</a>
      <a href="/liste.html">Liste de course</a>
    </nav>

    <main id="app" class="p-8">
      <div class="flex items-center gap-4 mb-4">
        <h1 class="text-2xl font-bold">Produits disponibles</h1>
        <span id="compteur-produits" class="bg-blue-200 text-blue-900 font-bold px-3 py-1 rounded"></span>
      </div>

      <div class="flex gap-4 mb-6">
        <input type="text" id="recherche" placeholder="Rechercher un produit..." class="border p-2 rounded w-full max-w-sm">
        <select id="tri" class="border p-2 rounded">
          <option value="nom">Trier par nom</option>
          <option value="prix">Trier par prix</option>
        </select>
        <button id="reset-filtres" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Réinitialiser</button>
      </div>

      <ul id="liste-produits" class="grid grid-cols-1 md:grid-cols-3 gap-4"></ul>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
